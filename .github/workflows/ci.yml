name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build and Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build zprobe (Debug)
        run: zig build -Doptimize=Debug

      - name: Run tests
        run: zig build test

  cross-compile:
    name: Cross-compile Release binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cross-compile for macOS ARM64
        run: zig build -Dtarget=aarch64-macos -Doptimize=ReleaseSafe

      - name: Cross-compile for Linux x86_64 musl (static)
        run: zig build -Dtarget=x86_64-linux-musl -Doptimize=ReleaseSafe

      - name: Cross-compile for Linux ARM64
        run: zig build -Dtarget=aarch64-linux -Doptimize=ReleaseSafe

      - name: Upload release binaries
        uses: actions/upload-artifact@v7
        with:
          name: zprobe-binaries
          path: zig-out/bin/
          retention-days: 7
